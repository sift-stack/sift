syntax = "proto3";

package sift.common.v1;

// Describes the type of a filter field.
enum FilterFieldType {
  FILTER_FIELD_TYPE_UNSPECIFIED = 0;
  FILTER_FIELD_TYPE_STRING = 1;
  FILTER_FIELD_TYPE_TIMESTAMP = 2;
  FILTER_FIELD_TYPE_INT = 3;
  FILTER_FIELD_TYPE_BOOL = 4;
  FILTER_FIELD_TYPE_DURATION = 5;
  FILTER_FIELD_TYPE_DOUBLE = 6;
  FILTER_FIELD_TYPE_ENUM = 7;
  FILTER_FIELD_TYPE_UUID = 8;
}

// Describes a single field available for CEL filtering on a resource.
message FilterField {
  // The field name to use in CEL filter expressions (e.g., "run_id", "created_date").
  string field_name = 1;
  // The data type of the field. UUID and ENUM are first-class types --
  // no need for separate boolean flags.
  FilterFieldType type = 2;
  // If type is FILTER_FIELD_TYPE_ENUM, these are the valid string values.
  repeated string enum_values = 3;
  // Human-readable description of the field (e.g., "When the run was created").
  string description = 4;
  // Human-friendly display name (e.g., "Asset Name" for field_name "asset_name").
  string display_name = 5;
}
